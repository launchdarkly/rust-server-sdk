name: Run CI
on:
  push:
    branches: [main, "feat/**"]
    paths-ignore:
      - "**.md" # Do not need to run CI for markdown changes.
  pull_request:
    branches: [main, "feat/**"]
    paths-ignore:
      - "**.md"

jobs:
  ci-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - name: "default"
            flags: ""
          - name: "no-features"
            flags: "--no-default-features"
          - name: "hyper"
            flags: "--no-default-features --features hyper"
          - name: "hyper-rustls"
            flags: "--no-default-features --features hyper-rustls"

    name: CI (${{ matrix.features.name }})

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # If you only need the current version keep this.

      - name: Get Rust version
        id: rust-version
        run: cat ./.github/variables/rust-versions.env >> $GITHUB_OUTPUT

      - name: Setup rust tooling
        run: |
          rustup override set ${{ steps.rust-version.outputs.target }}
          rustup component add rustfmt clippy

      - uses: ./.github/actions/ci
        with:
          feature-flags: ${{ matrix.features.flags }}

  contract-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Rust version
        id: rust-version
        run: cat ./.github/variables/rust-versions.env >> $GITHUB_OUTPUT

      - name: Setup rust tooling
        run: |
          rustup override set ${{ steps.rust-version.outputs.target }}
          rustup component add rustfmt clippy

      - name: "Run contract tests with hyper_rustls"
        uses: ./.github/actions/contract-tests
        with:
          tls_feature: "hyper-rustls"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Run contract tests with hyper_tls"
        uses: ./.github/actions/contract-tests
        with:
          tls_feature: "tls"
          token: ${{ secrets.GITHUB_TOKEN }}

  build-docs:
    runs-on: ubuntu-latest
    name: Build Documentation (all features)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Rust version
        id: rust-version
        run: cat ./.github/variables/rust-versions.env >> $GITHUB_OUTPUT

      - name: Setup rust tooling
        run: |
          rustup override set ${{ steps.rust-version.outputs.target }}

      - uses: ./.github/actions/build-docs

  musl-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # If you only need the current version keep this.

      - name: Get Rust version
        id: rust-version
        run: cat ./.github/variables/rust-versions.env >> $GITHUB_OUTPUT

      - name: Setup rust tooling
        run: |
          rustup override set ${{ steps.rust-version.outputs.target }}
          rustup component add rustfmt clippy
          rustup target add x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: TARGET_CC=musl-gcc RUSTFLAGS="-C linker=musl-gcc" cargo build --release --target=x86_64-unknown-linux-musl -p launchdarkly-server-sdk
